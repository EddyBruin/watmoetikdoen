<html lang="nl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --bg: #F4F1EC;
      --card: #FFFFFF;
      --dark: #1C1C1E;
      --mid: #6B6B6B;
      --accent: #E8440A;
      --accent2: #2D6BE4;
      --green: #1A9E5C;
      --border: #E0DDD7;
      --tag-m: #EBF2FF;
      --tag-m-text: #2D6BE4;
      --tag-f: #FFF0F5;
      --tag-f-text: #D4006A;
      
      /* Bonte Avond Kleuren */
      --groep-blauw: #2D6BE4;
      --groep-rood: #E8440A;
      --groep-geel: #D4A017;
      --groep-oranje: #EA580C;
      --groep-groen: #1A9E5C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: var(--dark);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .topbar-title span { color: var(--accent); }

    .btn-wissel {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    
    .btn-wissel:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Main layout */
    .container {
      max-width: 900px; /* Iets smaller voor een persoonlijk overzicht */
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Controls (Selection Screen) */
    .controls {
      background: var(--card);
      border-radius: 20px;
      padding: 32px 32px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      text-align: center;
    }

    .controls-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 12px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--dark);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); background: #FFF; }

    /* Results Header */
    .results-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 24px;
      gap: 8px;
    }

    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
    }

    .results-meta {
      font-size: 15px;
      color: var(--mid);
      font-weight: 500;
    }

    /* Statistieken Sectie (Groep Info) */
    .stats-panel {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 32px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      flex: 1;
      min-width: 300px;
    }

    .stat-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 16px;
    }

    /* Accordeons / Dagen */
    .days-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: border-color 0.3s;
    }

    .group-card.highlight-day {
      border: 2px solid var(--accent);
      box-shadow: 0 4px 16px rgba(232, 68, 10, 0.15);
    }

    .group-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: #FAFAF8;
      transition: background 0.2s;
    }
    
    .group-header:hover {
      background: #FFFFFF;
    }

    .highlight-day .group-header {
      background: #FFF9F7;
    }

    .group-name {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .group-size {
      background: var(--bg);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--mid);
    }

    .group-body {
      padding: 0;
      display: none;
    }

    .list-section-header {
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--mid);
    }
    
    .list-section-header:first-child {
      border-top: none;
    }

    .kind-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      background: #FFF;
    }

    .kind-row:last-child { border-bottom: none; }

    .kind-naam {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .sub-text {
      font-size: 13px;
      color: var(--mid);
      font-weight: 500;
    }

    .kind-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Badges */
    .tag {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg);
      color: var(--mid);
    }

    .post-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent2);
      background: var(--tag-m);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }
    
    .badge-groen { background: #E6F5ED; color: var(--green); }
    .badge-roze { background: var(--tag-f); color: var(--tag-f-text); }
    .badge-oranje { background: #FFF0EB; color: var(--accent); }

    .ronde-badge {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 12px;
      background: var(--accent);
      color: #fff;
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .ronde-badge.vandaag {
      background: var(--accent);
    }
    .ronde-badge.dagdeel {
      background: var(--dark);
      font-size: 11px;
    }

    @media (max-width: 600px) {
      .topbar { padding: 14px 20px; }
      .container { padding: 24px 16px 60px; }
      .kind-row { flex-direction: column; align-items: flex-start; }
      .kind-meta { width: 100%; justify-content: flex-start; margin-top: 8px; }
    }
  </style>
</head>

      renderGroup(leider);
      renderDays(leider);
  }

  // Terug naar selectie
  function wisselLeider() {
      localStorage.removeItem('kamp2_geselecteerde_leider');
      screenSelect.style.display = 'block';
      screenDay.style.display = 'none';
      btnWissel.style.display = 'none';
  }

  // Render Bonte Avond Groep
  function renderGroup(leider) {
      groupSection.innerHTML = '';
      const mijnGroep = groepen.find(g => matchesLeader(leider, g.leiders));

      const card = document.createElement('div');
      card.className = 'stat-card';

      if (mijnGroep) {
          const andereLeiders = mijnGroep.leiders.filter(l => !matchesLeader(leider, [l]));
          card.innerHTML = `
              <div class="stat-title">Jouw Bonte Avond Groep</div>
              <div style="font-family:'Syne', sans-serif; font-size: 20px; font-weight: 800; color: ${mijnGroep.cssVar}; margin-bottom: 12px;">
                  Groep ${mijnGroep.kleur}
              </div>
              <div style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">
                  Samen met: <span style="color:var(--mid);">${andereLeiders.join(', ') || '-'}</span>
              </div>
              <div style="font-size: 13px; color: var(--mid); line-height: 1.6;">
                  <strong>Kinderen (${mijnGroep.kids.length}):</strong><br>
                  ${mijnGroep.kids.join(' • ')}
              </div>
          `;
      } else {
          card.innerHTML = `
              <div class="stat-title">Bonte Avond Groep</div>
              <div style="font-family:'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 8px;">
                  Geen vaste groep
              </div>
              <div style="font-size: 14px; color: var(--mid);">
                  Jij bent ingedeeld als Hoofdleiding, EHBO of Kookstaf.
              </div>
          `;
      }
      groupSection.appendChild(card);
  }

  // Render Dagen Schema
  function renderDays(leider) {
      daysList.innerHTML = '';
      const todayStr = new Date().toISOString().split('T')[0];

      schema.forEach((dag, index) => {
          const isToday = (dag.date === todayStr);

          // -- Data Verzamelen --
          
          // Diensten
          const heeftTafel = matchesLeader(leider, dag.tafeldienst);
          const heeftNacht = matchesLeader(leider, dag.nachtdienst);

          // Corvee
          const mijnCorvees = [];
          dag.corvee.forEach(c => {
              const mijnGroep = c.groepen.find(g => matchesLeader(leider, g.wie) || g.wie.includes('ALLEN'));
              if (mijnGroep) {
                  mijnCorvees.push({
                      type: c.type,
                      taak: c.taak,
                      kleur: mijnGroep.kleur,
                      samenMet: mijnGroep.wie.filter(p => !matchesLeader(leider, [p]) && p !== 'ALLEN')
                  });
              }
          });

          // Spellen
          const mijnSpellen = [];
          dag.spellen.forEach(spel => {
              const mijnRolMatch = spel.rollen.find(r => matchesLeader(leider, r.wie) || r.wie.includes('ALLEN'));
              if (mijnRolMatch) {
                  mijnSpellen.push({ 
                      naam: spel.naam, 
                      dagdeel: spel.dagdeel, 
                      rol: mijnRolMatch.rol, 
                      samenMet: mijnRolMatch.wie.filter(p => !matchesLeader(leider, [p]) && p !== 'ALLEN') 
                  });
              }
          });


          // -- HTML Opbouwen --
          
          const card = document.createElement('div');
          card.className = `group-card ${isToday ? 'highlight-day' : ''}`;
          
          let todayBadge = isToday ? `<span class="ronde-badge vandaag" style="margin-left:8px;">VANDAAG</span>` : '';
          let iconState = isToday ? '▲' : '▼';

          let html = `
              <div class="group-header" onclick="toggleAccordion(${index})">
                  <div class="group-name">${dag.name} ${todayBadge}</div>
                  <div class="group-size" id="icon-${index}">${iconState}</div>
              </div>
              <div class="group-body" id="content-${index}" style="display: ${isToday ? 'block' : 'none'};">
          `;

          // 1. Algemene Diensten
          html += `<div class="list-section-header">Diensten</div>`;
          html += `
              <div class="kind-row">
                  <div class="kind-naam">Tafeldienst</div>
                  <div class="kind-meta">${heeftTafel ? '<span class="post-badge badge-groen">JA</span>' : '<span class="tag">NEE</span>'}</div>
              </div>
              <div class="kind-row">
                  <div class="kind-naam">Nachtdienst</div>
                  <div class="kind-meta">${heeftNacht ? '<span class="post-badge badge-roze">JA</span>' : '<span class="tag">NEE</span>'}</div>
              </div>
          `;

          // 2. Corvee
          html += `<div class="list-section-header">Corveerooster</div>`;
          if (mijnCorvees.length > 0) {
              mijnCorvees.forEach(c => {
                  let partners = c.samenMet.length > 0 ? `Met: ${c.samenMet.join(', ')}` : 'Samen met de rest';
                  let badgeKleur = c.kleur && c.kleur !== '-' ? `<span class="tag">${c.kleur}</span>` : '';
                  
                  html += `
                  <div class="kind-row">
                      <div class="kind-naam">
                          ${c.taak}
                          <div class="sub-text">${partners}</div>
                      </div>
                      <div class="kind-meta">
                          <span class="ronde-badge dagdeel">${c.type}</span>
                          ${badgeKleur}
                      </div>
                  </div>`;
              });
          } else {
              html += `<div class="kind-row"><div class="kind-naam sub-text" style="font-style:italic;">Geen corvee vandaag.</div></div>`;
          }

          // 3. Spellen
          html += `<div class="list-section-header">Spel Begeleiding & Rollen</div>`;
          if (mijnSpellen.length > 0) {
              mijnSpellen.forEach(s => {
                  let partners = s.samenMet.length > 0 ? `Samen met: ${s.samenMet.join(', ')}` : 'Zelfstandig / Allen';
                  let isActeur = s.rol.toLowerCase().includes('acteur') || s.rol.toLowerCase().includes('outfit');
                  let rolBadge = isActeur ? 'badge-roze' : 'badge-oranje';
                  
                  html += `
                  <div class="kind-row">
                      <div class="kind-naam">
                          ${s.naam}
                          <div class="sub-text">${partners}</div>
                      </div>
                      <div class="kind-meta">
                          <span class="post-badge ${rolBadge}">${s.rol}</span>
                          <span class="ronde-badge dagdeel">${s.dagdeel}</span>
                      </div>
                  </div>`;
              });
          } else {
              html += `<div class="kind-row"><div class="kind-naam sub-text" style="font-style:italic;">Geen rol toegewezen.</div></div>`;
          }

          html += `</div>`; // Sluit group-body
          card.innerHTML = html;
          daysList.appendChild(card);
      });
  }

  // Accordeon bediening
  window.toggleAccordion = function(index) {
      const content = document.getElementById(`content-${index}`);
      const icon = document.getElementById(`icon-${index}`);
      
      if (content.style.display === 'none' || content.style.display === '') {
          content.style.display = 'block';
          icon.textContent = '▲';
      } else {
          content.style.display = 'none';
          icon.textContent = '▼';
      }
  };

  // Start applicatie
  initApp();
</script>

</body>
</html>
